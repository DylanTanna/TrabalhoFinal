<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PsicoWeb | Editar cadastro</title>
    <link rel="stylesheet" href="assets/style.css">
  </head>
  <body>
    <div class="app-shell" data-app-shell>
      <main class="main">
        <section class="content">
          <div class="page-header">
            <div>
              <p class="eyebrow">Pacientes</p>
              <h1>Editar cadastro</h1>
              <p class="subtitle">Dados cadastrais mockados para navegação do protótipo.</p>
            </div>
          </div>

          <section class="card panel">
            <form class="form-grid">
              <div class="field">
                <label for="nome">Nome</label>
                <input id="nome" type="text" value="Camila Martins">
              </div>
              <div class="field">
                <label for="cpf">CPF</label>
                <input id="cpf" type="text" value="123.456.789-10">
              </div>
              <div class="field">
                <label for="telefone">Telefone</label>
                <input id="telefone" type="text" value="(11) 98812-4410">
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" value="camila.martins@email.com">
              </div>
              <div class="field full">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes">Paciente em acompanhamento semanal, com preferência por atendimentos no período da manhã.</textarea>
              </div>
              <div class="field full">
                <p class="muted" data-last-update>Última atualização: 14/05/2026 às 08:30 por Marina Souza</p>
                <button class="btn primary" type="button" data-save-patient>Salvar alterações</button>
              </div>
            </form>
          </section>
        </section>
      </main>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
