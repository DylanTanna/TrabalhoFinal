<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PsicoWeb | Cadastro da clínica</title>
    <link rel="stylesheet" href="assets/style.css">
  </head>
  <body>
    <div class="app-shell" data-app-shell>
      <main class="main">
        <section class="content">
          <div class="page-header">
            <div>
              <p class="eyebrow">Institucional</p>
              <h1>Cadastro da clínica</h1>
              <p class="subtitle">CDU 02 - Cadastrar clínica com dados mockados.</p>
            </div>
          </div>

          <section class="card panel">
            <form class="form-grid">
              <div class="field"><label>Nome fantasia</label><input type="text" value="PsicoWeb Saúde Integrada"></div>
              <div class="field"><label>Razão social</label><input type="text" value="PsicoWeb Clínica de Psicologia LTDA"></div>
              <div class="field"><label>CNPJ</label><input type="text" value="12.345.678/0001-90"></div>
              <div class="field"><label>CRP responsável</label><input type="text" value="CRP 06/123456"></div>
              <div class="field full"><label>Endereço</label><input type="text" value="Av. Paulista, 1000 - São Paulo/SP"></div>
              <div class="field"><label>Telefone</label><input type="text" value="(11) 3333-4400"></div>
              <div class="field"><label>Email</label><input type="email" value="contato@psicoweb.com.br"></div>
              <div class="field full"><button class="btn primary" type="button" data-clinic-save>Finalizar cadastro</button></div>
            </form>
          </section>
        </section>
      </main>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
