<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PsicoWeb | Vínculos</title>
    <link rel="stylesheet" href="assets/style.css">
  </head>
  <body>
    <div class="app-shell" data-app-shell>
      <main class="main">
        <section class="content">
          <div class="page-header">
            <div>
              <p class="eyebrow">Colaboradores</p>
              <h1>Vínculos</h1>
              <p class="subtitle">CDU 03 - Configurar vínculo de assistente ao psicólogo.</p>
            </div>
          </div>

          <section class="card panel">
            <div class="link-grid">
              <div class="field">
                <label>Psicólogos</label>
                <select><option>Dra. Ana Costa</option><option>Dr. Lucas Nery</option></select>
              </div>
              <div class="field">
                <label>Assistentes</label>
                <select><option>Marina Souza</option><option>Rafael Lima</option></select>
              </div>
              <div class="field">
                <label>Status</label>
                <span class="badge neutral" data-link-status>Sem vínculo</span>
              </div>
              <div class="field">
                <label>Ação</label>
                <button class="btn primary" type="button" data-link-assistant>Vincular</button>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
